<!doctype html>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400..900&display=swap" rel="stylesheet">
<style>
  :root {
    /* YNAB design system */
    --blurple: #545bfe;
    --blurple-300: #a3acff;
    --blurple-400: #7583ff;
    --blurple-700: #383ca3;
    --blurple-900: #1b1d48;
    --buttermilk: #fef9ed;
    --buttermilk-150: #fdf3d2;
    --midnight: #1c1f58;
    --meadow: #41d298;
    --dandelion: #f6c91d;
    --sunset: #fc6350;
    --neutral-400: #727484;
    --neutral-500: #56596c;

    --bg: var(--buttermilk);
    --fg: var(--midnight);
    --muted: var(--neutral-500);
    --number-gradient: linear-gradient(160deg, var(--blurple-400) 0%, var(--blurple) 45%, var(--blurple-700) 100%);
    --glow: rgba(84, 91, 254, 0.18);
    --blob-opacity: 0.55;

    --ease-out-soft: cubic-bezier(0.16, 1, 0.3, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14163a;
      --fg: var(--buttermilk);
      --muted: #8f92c9;
      --number-gradient: linear-gradient(160deg, #c3c9ff 0%, var(--blurple-300) 40%, var(--blurple) 100%);
      --glow: rgba(117, 131, 255, 0.25);
      --blob-opacity: 0.32;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Figtree", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(0.5rem, 1.5vh, 1.25rem);
    text-align: center;
    padding: 2rem;
    overflow: hidden;
    transition: background 0.6s ease;
  }

  /* ————— Ambient background ————— */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    animation: ambient-in 2.4s var(--ease-out-soft) 0.1s forwards;
    z-index: 0;
  }
  @keyframes ambient-in { to { opacity: var(--blob-opacity); } }

  /* soft gradients only — no blur filters, transforms stay on the compositor */
  .blob {
    position: absolute;
    border-radius: 50%;
    will-change: transform;
  }
  .blob-1 {
    width: 55vmax; height: 55vmax;
    top: -20vmax; left: -15vmax;
    background: radial-gradient(circle, var(--blurple-300) 0%, transparent 70%);
    animation: drift-1 26s ease-in-out infinite alternate;
  }
  .blob-2 {
    width: 45vmax; height: 45vmax;
    bottom: -18vmax; right: -12vmax;
    background: radial-gradient(circle, var(--meadow) 0%, transparent 70%);
    animation: drift-2 32s ease-in-out infinite alternate;
  }
  .blob-3 {
    width: 35vmax; height: 35vmax;
    bottom: -10vmax; left: 8vmax;
    background: radial-gradient(circle, var(--dandelion) 0%, transparent 70%);
    animation: drift-3 38s ease-in-out infinite alternate;
  }
  @keyframes drift-1 { to { transform: translate(8vmax, 6vmax) scale(1.15); } }
  @keyframes drift-2 { to { transform: translate(-6vmax, -8vmax) scale(1.1); } }
  @keyframes drift-3 { to { transform: translate(10vmax, -4vmax) scale(0.9); } }

  /* ————— Content ————— */
  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(0.5rem, 1.5vh, 1.25rem);
  }

  .reveal {
    opacity: 0;
    transform: translateY(24px) scale(0.97);
    animation: reveal 1.1s var(--ease-out-soft) forwards;
  }
  @keyframes reveal {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .stage {
    animation-delay: 0.55s;
    position: relative;
  }

  .number-wrap {
    position: relative;
    display: inline-block;
    will-change: transform;
  }

  .number {
    font-size: clamp(11rem, 42vw, 34rem);
    font-weight: 850;
    font-variation-settings: "wght" 850;
    line-height: 1;
    padding: 0.02em 0.06em;
    font-variant-numeric: tabular-nums;
    background: var(--number-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: inline-block;
    will-change: transform;
    user-select: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* soft glow behind the number */
  .number-wrap::before {
    content: "";
    position: absolute;
    inset: -5%;
    background: radial-gradient(ellipse at center, var(--glow), transparent 70%);
    z-index: -1;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .settled .number-wrap::before { opacity: 1; }

  /* settle bounce once the countdown lands on 0 */
  .settled .number { animation: settle 0.9s var(--ease-out-soft); }
  @keyframes settle {
    0%   { transform: scale(1); }
    20%  { transform: scale(1.07); }
    55%  { transform: scale(0.985); }
    100% { transform: scale(1); }
  }

  /* shine sweep across the 0 after it settles */
  .shine {
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.85) 50%, transparent 65%);
    background-size: 250% 100%;
    background-position: 120% 0;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font: inherit;
    font-size: clamp(11rem, 42vw, 34rem);
    font-weight: 850;
    font-variation-settings: "wght" 850;
    line-height: 1;
    padding: 0.02em 0.06em;
    pointer-events: none;
    opacity: 0;
  }
  .settled .shine { animation: shine 1.6s ease 0.35s; }
  @keyframes shine {
    0%   { opacity: 1; background-position: 150% 0; }
    100% { opacity: 1; background-position: -50% 0; }
  }

  /* wince on click — the bicep remembers */
  .wince .number { animation: wince 0.55s var(--ease-out-soft); }
  @keyframes wince {
    0%   { transform: scale(1) rotate(0deg); }
    25%  { transform: scale(0.94) rotate(-2.5deg); }
    55%  { transform: scale(1.03) rotate(1.5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-delay: 0s !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main>
    <div class="stage reveal" id="stage">
      <div class="number-wrap" id="numberWrap">
        <div class="number" id="number" aria-live="polite" aria-label="0 pounds">425</div>
        <div class="shine" aria-hidden="true">0</div>
      </div>
    </div>
  </main>

<script>
(function () {
  const numberEl = document.getElementById("number");
  const wrapEl = document.getElementById("numberWrap");
  const stageEl = document.getElementById("stage");
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const START = 425;
  const DURATION = 2200;
  const DELAY = 900; /* let the entrance reveal breathe first */

  function easeOutExpo(t) {
    return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t);
  }

  function settle() {
    numberEl.textContent = "0";
    numberEl.style.transform = "";
    document.body.classList.add("settled");
  }

  if (reducedMotion) {
    settle();
  } else {
    setTimeout(function () {
      const t0 = performance.now();
      let last = START;

      function frame(now) {
        const t = Math.min((now - t0) / DURATION, 1);
        const value = Math.round(START * (1 - easeOutExpo(t)));

        if (value !== last) {
          numberEl.textContent = String(value);
          /* speed stretch proportional to how fast the number is falling —
             transform stays on the compositor, unlike a blur filter */
          const velocity = last - value;
          const stretch = 1 + Math.min(velocity * 0.008, 0.12);
          numberEl.style.transform = "scaleY(" + stretch + ")";
          last = value;
        }

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          settle();
        }
      }
      requestAnimationFrame(frame);
    }, DELAY);
  }

  /* gentle pointer parallax, Apple-style */
  if (!reducedMotion && window.matchMedia("(pointer: fine)").matches) {
    let targetX = 0, targetY = 0, x = 0, y = 0, raf = null;

    function tick() {
      x += (targetX - x) * 0.08;
      y += (targetY - y) * 0.08;
      wrapEl.style.transform = "translate(" + x + "px, " + y + "px)";
      if (Math.abs(targetX - x) > 0.1 || Math.abs(targetY - y) > 0.1) {
        raf = requestAnimationFrame(tick);
      } else {
        raf = null;
      }
    }

    window.addEventListener("pointermove", function (e) {
      targetX = (e.clientX / window.innerWidth - 0.5) * 18;
      targetY = (e.clientY / window.innerHeight - 0.5) * 12;
      if (!raf) raf = requestAnimationFrame(tick);
    }, { passive: true });
  }

  /* click the 0 and it winces */
  numberEl.addEventListener("click", function () {
    if (!document.body.classList.contains("settled")) return;
    stageEl.classList.remove("wince");
    void stageEl.offsetWidth; /* restart the animation */
    stageEl.classList.add("wince");
  });
})();
</script>
</body>
</html>
